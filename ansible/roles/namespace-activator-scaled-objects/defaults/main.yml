NAMESPACE_ACTIVATOR_REDIRECTION_IMAGE_NAME: docker.io/nginx
NAMESPACE_ACTIVATOR_REDIRECTION_IMAGE_TAG: 1.29-alpine

deployments_for_scaled_objects:
  - name: api-deployment
    # since this one relies on the session store to be up, it will just continuously fail when the namespace is disabled
  - name: api-worker-deployment
  - name: admin-api-deployment
  - name: client-deployment
  - name: amqp-file-storage-deployment
  - name: api-h5p-proxy-deployment
  - name: api-h5p-deployment
  - name: api-h5p-consumer
  - name: h5p-staticfiles-server-deployment
  - name: antivirus-webserver-deployment
  - name: antivirus-scanfile-deployment
  - name: file-storage-deployment
  - name: legacy-file-archive-deployment
  - name: api-migration-systems-deployment
    with: "{{ WITH_MIGRATION_SYSTEMS }}"
  - name: preview-generator-deployment
  - name: api-fwu-deployment
    with: "{{ WITH_FWU }}"
  - name: calendar-deployment
  - name: clamav-deployment
  - name: default-backend-404-deployment
  - name: etherpad-deployment
  - name: etherpad-nginx-deployment
  - name: hydra-deployment
  - name: management-deployment
  - name: nuxtclient-deployment
  - name: shd-deployment
  - name: version-aggregator-deployment
  - name: mailcatcher-deployment
  - name: maildrop-deployment
  - name: board-collaboration-deployment
    kind: Deployment
    replicaCount: "{{BOARD_COLLABORATION_SERVER_REPLICAS}}"
  - name: common-cartridge-deployment
  - name: clammit-deployment
  - name: schulconnex-group-provisioning-deployment
    with: "{{ WITH_SCHULCONNEX_PROVISIONING }}"
  - name: schulconnex-group-removal-deployment
    with: "{{ WITH_SCHULCONNEX_PROVISIONING }}"
  - name: schulconnex-license-provisioning-deployment
    with: "{{ WITH_SCHULCONNEX_PROVISIONING }}"
  - name: tldraw-server-deployment
  - name: tldraw-worker-deployment
  - name: tldraw-client-deployment
  - name: collabora-online
  - name: tldraw-valkey
    kind: StatefulSet
    replicaCount: "{{TLDRAW_VALKEY_REPLICAS}}"
  - name: session-valkey
    kind: StatefulSet
    replicaCount: "{{SESSION_VALKEY_REPLICAS}}"
